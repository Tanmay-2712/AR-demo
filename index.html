<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Heritage | Augmented Reality</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
</head>
<body>
    <div id="app">
        <!-- AR Video Background -->
        <video id="ar-video" playsinline autoplay muted></video>
        
        <!-- Three.js Canvas Container -->
        <div id="canvas-container"></div>

        <!-- Intro Title (shown during animation) -->
        <div id="intro-title">
            <h1>THE&nbsp;HERITAGE</h1>
            <p>A Private Experience</p>
        </div>

        <!-- UI Overlay (hidden until animation completes) -->
        <div id="ui-overlay" class="ui-panel hidden">
            <!-- Bottom Catalogue -->
            <div class="bottom-controls">
                <div class="catalogue-container">
                    <div class="catalogue-scroll" id="ring-catalogue">
                        <!-- Items injected one by one as rings land -->
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="./main.js"></script>
</body>
</html>
